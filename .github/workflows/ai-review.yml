name: AI Review
on:
    pull_request:
        types: [ opened, synchronize, reopened ]
jobs:
    review:
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
            contents: read
        steps:
            - uses: kenny08gt/PR-Agent-Reviewer@main
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  openai-api-key: ${{ secrets.OPENAI_API_KEY }}
                  dry-run: "true" # flip to 'false' once you're happy 
